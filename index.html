<!DOCTYPE html>
<html>
<head>
  <title>ISEP SmartPresence PRO</title>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0f2027, #0a0f1c);
      color: white;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 30px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 40px rgba(0,255,255,0.1);
    }

    header img {
      width: 70px;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 10px #00f7ff);
    }

    header h1 {
      font-size: 24px;
      letter-spacing: 1px;
    }

    header p {
      font-size: 13px;
      opacity: 0.7;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 25px rgba(0,255,255,0.05);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 40px rgba(0,255,255,0.15);
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .scanBtn {
      background: linear-gradient(135deg,#00f7ff,#00c3ff);
    }

    .photoBtn {
      background: linear-gradient(135deg,#00ff94,#00c76a);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(0,255,255,0.4);
    }

    video, img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    ul {
      list-style: none;
    }

    li {
      background: rgba(255,255,255,0.08);
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      font-size: 13px;
    }

    canvas {
      background: white;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png">
  <h1>ISEP SmartPresence</h1>
  <p>Système intelligent de présence</p>
</header>

<div class="container">

<div class="card">
  <input id="nom" placeholder="Nom">
  <input id="matricule" placeholder="Matricule">

  <button class="scanBtn" onclick="startScanner()">📸 Scanner QR</button>
  <div id="reader"></div>

  <video id="video" autoplay></video>

  <button class="photoBtn" onclick="takePhoto()">📷 Capturer</button>

  <canvas id="canvas" style="display:none;"></canvas>
  <img id="preview" />
</div>

<div class="card">
  <h3>📊 Statistiques</h3>
  Total : <span id="total">0</span><br>
  Uniques : <span id="unique">0</span>

  <canvas id="chart"></canvas>
</div>

<div class="card">
  <h3>📋 Présences</h3>
  <ul id="liste"></ul>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsFxW7QON1JhWshuwz8EXE9NggQ0fCUMA",
  authDomain: "smartpresence-ff489.firebaseapp.com",
  databaseURL: "https://smartpresence-ff489-default-rtdb.firebaseio.com",
  projectId: "smartpresence-ff489",
  storageBucket: "smartpresence-ff489.firebasestorage.app",
  messagingSenderId: "676917669187",
  appId: "1:676917669187:web:d825c0b3ff3ee0944c13f6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let chart;

onValue(ref(db, "presences"), (snapshot) => {

  let liste = document.getElementById("liste");
  liste.innerHTML = "";

  let total = 0;
  let uniqueSet = new Set();

  snapshot.forEach((child) => {
    let d = child.val();

    total++;
    uniqueSet.add(d.matricule);

    let li = document.createElement("li");
    li.innerHTML = `
      <b>${d.nom}</b><br>
      ${d.matricule}<br>
      <img src="${d.photo}">
    `;
    liste.appendChild(li);
  });

  document.getElementById("total").textContent = total;
  document.getElementById("unique").textContent = uniqueSet.size;
});

let html5QrCode;

window.startScanner = function() {

  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {
    html5QrCode.start(
      devices[0].id,
      { fps: 10, qrbox: 250 },
      () => {
        html5QrCode.stop();
        startCamera();
      }
    );
  });
};

function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      document.getElementById("video").srcObject = stream;
    });
}

window.takePhoto = async function() {

  let video = document.getElementById("video");
  let canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  let imageData = canvas.toDataURL("image/png");
  document.getElementById("preview").src = imageData;

  let fileRef = sRef(storage, "photos/" + Date.now());
  await uploadString(fileRef, imageData, "data_url");
  let url = await getDownloadURL(fileRef);

  push(ref(db, "presences"), {
    nom: document.getElementById("nom").value,
    matricule: document.getElementById("matricule").value,
    photo: url,
    date: new Date().toLocaleString()
  });

  alert("✅ Présence enregistrée !");
};

</script>

</body>
</html>
