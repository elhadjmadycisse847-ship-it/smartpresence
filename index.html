<!DOCTYPE html>
<html>
<head>
  <title>ISEP SmartPresence PRO MAX</title>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins';
      background: #0f2027;
      color: white;
      margin:0;
    }

    header {
      text-align:center;
      padding:20px;
      background:#1e90ff;
    }

    .container {
      max-width:420px;
      margin:auto;
      padding:20px;
    }

    .card {
      background:#203a43;
      padding:15px;
      border-radius:15px;
      margin-bottom:15px;
    }

    input, button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:10px;
      border:none;
    }

    button { cursor:pointer; }

    .admin { display:none; }

  </style>
</head>

<body>

<header>
  <h2>ISEP SmartPresence</h2>
</header>

<div class="container">

<!-- LOGIN -->
<div class="card">
  <h3>🔐 Admin Login</h3>
  <input id="adminUser" placeholder="Username">
  <input id="adminPass" type="password" placeholder="Password">
  <button onclick="login()">Connexion</button>
</div>

<!-- SCANNER -->
<div class="card">
  <input id="nom" placeholder="Nom">
  <input id="matricule" placeholder="Matricule">

  <button onclick="startScanner()">Scanner QR</button>
  <div id="reader"></div>

  <video id="video" autoplay></video>
  <button onclick="takePhoto()">Capturer</button>

  <canvas id="canvas" style="display:none;"></canvas>
</div>

<!-- ADMIN PANEL -->
<div class="card admin" id="adminPanel">
  <h3>📊 Admin Panel</h3>
  <button onclick="exportExcel()">📥 Export Excel</button>

  <ul id="liste"></ul>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsFxW7QON1JhWshuwz8EXE9NggQ0fCUMA",
  authDomain: "smartpresence-ff489.firebaseapp.com",
  databaseURL: "https://smartpresence-ff489-default-rtdb.firebaseio.com",
  projectId: "smartpresence-ff489",
  storageBucket: "smartpresence-ff489.firebasestorage.app",
  messagingSenderId: "676917669187",
  appId: "1:676917669187:web:d825c0b3ff3ee0944c13f6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let dataList = [];


// 🔐 LOGIN SIMPLE
window.login = function(){
  let u = document.getElementById("adminUser").value;
  let p = document.getElementById("adminPass").value;

  if(u === "admin" && p === "1234"){
    document.getElementById("adminPanel").style.display = "block";
    alert("Accès admin !");
  } else {
    alert("Erreur login");
  }
};


// 🚨 ANTI TRICHE
function antiFraude(matricule){
  let last = localStorage.getItem(matricule);

  if(last){
    let diff = Date.now() - parseInt(last);

    if(diff < 60000){ // 1 minute
      alert("⛔ Déjà enregistré !");
      return false;
    }
  }

  localStorage.setItem(matricule, Date.now());
  return true;
}


// 📊 LISTE
onValue(ref(db, "presences"), (snapshot)=>{
  let ul = document.getElementById("liste");
  ul.innerHTML="";
  dataList=[];

  snapshot.forEach(c=>{
    let d = c.val();
    dataList.push(d);

    let li = document.createElement("li");
    li.innerHTML = d.nom+" - "+d.matricule+" - "+d.date;
    ul.appendChild(li);
  });
});


// 📸 CAMERA
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(s=>{
    document.getElementById("video").srcObject = s;
  });
}


// 📸 SCAN
window.startScanner = function(){
  let qr = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices=>{
    qr.start(devices[0].id,{fps:10,qrbox:250},()=>{
      qr.stop();
      startCamera();
    });
  });
};


// 📸 PHOTO + SAVE
window.takePhoto = function(){
  let nom = document.getElementById("nom").value;
  let matricule = document.getElementById("matricule").value;

  if(!antiFraude(matricule)) return;

  push(ref(db,"presences"),{
    nom,
    matricule,
    date:new Date().toLocaleString()
  });

  alert("Présence OK");
};


// 📥 EXPORT EXCEL
window.exportExcel = function(){

  let ws = XLSX.utils.json_to_sheet(dataList);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Présences");

  XLSX.writeFile(wb, "presences.xlsx");
};

</script>

</body>
</html>
