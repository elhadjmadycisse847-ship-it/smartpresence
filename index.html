<!DOCTYPE html>
<html>
<head>
  <title>SmartPresence MAX</title>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: #00ffcc;
      text-align: center;
    }

    /* BACKGROUND HACKER */
    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: url("https://i.imgur.com/8QfQZ4V.gif");
      opacity: 0.2;
      z-index: -1;
    }

    h1 {
      color: #00ffcc;
      margin-top: 20px;
      text-shadow: 0 0 10px #00ffcc;
    }

    input {
      padding: 12px;
      margin: 8px;
      border-radius: 10px;
      border: none;
      width: 250px;
      text-align: center;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      background: #00ffcc;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00cc99;
      transform: scale(1.05);
    }

    #reader {
      margin-top: 20px;
    }

    table {
      width: 90%;
      margin: auto;
      margin-top: 20px;
      border-collapse: collapse;
      background: rgba(0,0,0,0.8);
    }

    th, td {
      border: 1px solid #00ffcc;
      padding: 10px;
    }

    th {
      background: #003333;
    }

    #qr {
      margin-top: 10px;
    }

  </style>
</head>

<body>

<h1>💻 ISEP DIAMNIADIO - SmartPresence</h1>

<input id="nom" placeholder="Nom"><br>
<input id="matricule" placeholder="Matricule"><br>

<button onclick="startScanner()">📸 Scanner QR</button>

<h3>🔁 QR Prof</h3>
<canvas id="qr"></canvas>

<h3>📊 Présences</h3>

<table id="table">
<tr><th>Nom</th><th>Matricule</th><th>Date</th></tr>
</table>

<button onclick="exportExcel()">📥 Export Excel</button>

<div id="reader"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "...",
  databaseURL: "...",
  projectId: "...",
  storageBucket: "...",
  messagingSenderId: "...",
  appId: "..."
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// QR dynamique
let currentQR = "";

function generateQR() {
  currentQR = "ISEP-" + Date.now();
  QRCode.toCanvas(document.getElementById("qr"), currentQR);
}

setInterval(generateQR, 30000);
generateQR();

// Scanner
let html5QrCode;

window.startScanner = function() {

  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10 },
    (decodedText) => {

      if (decodedText !== currentQR) {
        alert("❌ Mauvais QR !");
        return;
      }

      let nom = document.getElementById("nom").value;
      let matricule = document.getElementById("matricule").value;

      push(ref(db, "presences"), {
        nom,
        matricule,
        date: new Date().toLocaleString()
      });

      alert("✅ Présence validée !");
      html5QrCode.stop();
    }
  );
};

// Tableau
const table = document.getElementById("table");

onValue(ref(db, "presences"), snapshot => {
  table.innerHTML = "<tr><th>Nom</th><th>Matricule</th><th>Date</th></tr>";

  snapshot.forEach(child => {
    let data = child.val();

    let row = table.insertRow();
    row.insertCell(0).innerText = data.nom;
    row.insertCell(1).innerText = data.matricule;
    row.insertCell(2).innerText = data.date;
  });
});

// Export
window.exportExcel = function() {

  let csv = "Nom,Matricule,Date\n";

  const rows = table.querySelectorAll("tr");

  rows.forEach((row, i) => {
    if (i === 0) return;

    const cols = row.querySelectorAll("td");
    csv += `${cols[0].innerText},${cols[1].innerText},${cols[2].innerText}\n`;
  });

  let blob = new Blob([csv], { type: "text/csv" });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "presences.csv";
  a.click();
};

</script>

</body>
</html>
