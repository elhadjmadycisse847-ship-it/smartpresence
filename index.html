<!DOCTYPE html>
<html>
<head>
  <title>ISEP SmartPresence PRO+</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
    }

    header {
      background: #0a3d62;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #1e90ff;
      color: white;
      font-weight: bold;
    }

    #photoBtn {
      background: green;
      font-size: 16px;
    }

    video, img {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<header>🎓 ISEP DIAMNIADIO - SmartPresence PRO+</header>

<div class="container">

<div class="card">

  <input id="nom" placeholder="Nom">
  <input id="matricule" placeholder="Matricule">

  <button onclick="startScanner()">📸 Scanner QR</button>

  <div id="reader"></div>

  <video id="video" autoplay></video>

  <button id="photoBtn" onclick="takePhoto()">
    📸 CLIQUE ICI POUR PRENDRE LA PHOTO
  </button>

  <canvas id="canvas" style="display:none;"></canvas>

  <img id="preview" />

</div>

<div class="card">
  <h3>📋 Présences</h3>
  <ul id="liste"></ul>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "TA_CLE",
  authDomain: "TON_PROJET.firebaseapp.com",
  databaseURL: "https://TON_PROJET-default-rtdb.firebaseio.com",
  projectId: "TON_PROJET",
  storageBucket: "TON_PROJET.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

// 📋 LISTE
const liste = document.getElementById("liste");

onValue(ref(db, "presences"), (snapshot) => {
  liste.innerHTML = "";

  snapshot.forEach((child) => {
    let d = child.val();

    let li = document.createElement("li");
    li.innerHTML = `
      ${d.nom} (${d.matricule})<br>
      <img src="${d.photo}" />
    `;

    liste.appendChild(li);
  });
});

// 📸 SCANNER
let html5QrCode;

window.startScanner = function() {

  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    let cameraId = devices[0].id;

    html5QrCode.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      () => {
        html5QrCode.stop();
        startCamera();
      }
    );

  });
};

// 📷 ACTIVER CAMERA
function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      document.getElementById("video").srcObject = stream;
    });
}

// 📷 PRENDRE PHOTO
window.takePhoto = async function() {

  let video = document.getElementById("video");
  let canvas = document.getElementById("canvas");
  let preview = document.getElementById("preview");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  let imageData = canvas.toDataURL("image/png");

  // 👀 aperçu
  preview.src = imageData;

  let fileRef = sRef(storage, "photos/" + Date.now());

  await uploadString(fileRef, imageData, "data_url");

  let url = await getDownloadURL(fileRef);

  let nom = document.getElementById("nom").value;
  let matricule = document.getElementById("matricule").value;

  push(ref(db, "presences"), {
    nom,
    matricule,
    photo: url,
    date: new Date().toLocaleString()
  });

  alert("✅ Photo + présence enregistrées !");
};

</script>

</body>
</html>
