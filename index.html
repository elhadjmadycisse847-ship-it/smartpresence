<!DOCTYPE html>
<html>
<head>
  <title>SmartPresence Camera Fix</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    button {
      padding: 15px;
      margin: 20px;
      font-size: 16px;
      background: green;
      color: white;
      border: none;
      border-radius: 10px;
    }

    #reader {
      width: 300px;
      margin: auto;
    }
  </style>
</head>

<body>

<h2>📸 Scanner QR (FIX)</h2>

<button onclick="startScanner()">Lancer Scanner</button>

<div id="reader"></div>

<script>

let html5QrCode;

function startScanner() {

  html5QrCode = new Html5Qrcode("reader");

  // 🔥 ON FORCE LISTE CAMÉRAS
  Html5Qrcode.getCameras().then(devices => {

    if (devices && devices.length) {

      let cameraId = devices[0].id; // prend la 1ère caméra

      html5QrCode.start(
        cameraId,
        { fps: 10, qrbox: 250 },
        (decodedText) => {
          alert("QR détecté: " + decodedText);
          html5QrCode.stop();
        }
      );

    } else {
      alert("❌ Aucune caméra trouvée");
    }

  }).catch(err => {
    alert("Erreur caméra: " + err);
  });
}

</script>

</body>
</html>
