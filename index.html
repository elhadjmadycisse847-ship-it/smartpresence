<!DOCTYPE html>
<html>
<head>
  <title>ISEP SmartPresence</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family:'Poppins';
      background:#0a0f1c;
      color:white;
    }

    header {
      text-align:center;
      padding:80px 20px;
    }

    h1 { font-size:42px; }

    .btn {
      display:inline-block;
      margin:10px;
      padding:15px 25px;
      border-radius:12px;
      background:#00c6ff;
      cursor:pointer;
    }

    .section {
      padding:40px 20px;
      text-align:center;
    }

    .card {
      background:rgba(255,255,255,0.08);
      padding:20px;
      margin:15px auto;
      border-radius:15px;
      max-width:400px;
    }

    #appSection {
      display:none;
      max-width:400px;
      margin:auto;
    }

    input, button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:10px;
      border:none;
    }

    video, img {
      width:100%;
      margin-top:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<header>
  <h1>ISEP SmartPresence</h1>

  <div class="btn" onclick="openApp()">🎓 Accéder à l'application</div>
  <a href="#contact" class="btn">📞 Contact</a>
</header>

<div class="section">
  <div class="card">📸 Scan QR sécurisé</div>
  <div class="card">📷 Preuve photo</div>
</div>

<!-- APP -->
<div id="appSection" class="section">

  <h2>📸 Enregistrer présence</h2>

  <input id="nom" placeholder="Nom">
  <input id="matricule" placeholder="Matricule">

  <button onclick="startScanner()">Scanner QR</button>
  <div id="reader"></div>

  <video id="video" autoplay></video>

  <button onclick="takePhoto()">Valider présence</button>

  <img id="preview">

</div>

<div class="section" id="contact">
  <div class="card">
    📱 78 751 49 35<br>
    📧 admin@isep.sn
  </div>
</div>

<script>
// OUVRIR APP
function openApp(){
  document.getElementById("appSection").style.display="block";
  window.scrollTo(0,document.body.scrollHeight);
}

// SCAN QR
function startScanner(){
  let qr = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices=>{
    qr.start(devices[0].id,{fps:10,qrbox:250},
    ()=>{
      qr.stop();
      startCamera();
    });
  });
}

// CAMERA
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(s=>{
    document.getElementById("video").srcObject = s;
  });
}

// PHOTO
function takePhoto(){
  let video = document.getElementById("video");
  let canvas = document.createElement("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video,0,0);

  let img = canvas.toDataURL();
  document.getElementById("preview").src = img;

  alert("✅ Présence enregistrée !");
}
</script>

</body>
</html>
