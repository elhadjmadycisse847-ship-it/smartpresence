<!DOCTYPE html>
<html>
<head>
  <title>ISEP Admin Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background:#0a0f1c;
      color:white;
      margin:0;
      text-align:center;
    }

    h2 {
      margin-top:20px;
    }

    .box {
      margin:20px;
      padding:20px;
      background:#1c1f2b;
      border-radius:15px;
    }

    button {
      padding:10px;
      margin-top:10px;
      width:90%;
      border-radius:10px;
      border:none;
      background:#00c6ff;
      font-weight:bold;
      cursor:pointer;
    }

    ul {
      list-style:none;
      padding:0;
    }

    li {
      margin:10px;
      background:#222;
      padding:10px;
      border-radius:10px;
    }

    img {
      margin-top:5px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h2>📊 ISEP SmartPresence ADMIN</h2>

<div class="box">
  <button onclick="exportExcel()">📥 Export Excel</button>
</div>

<div class="box">
  <h3>📈 Statistiques</h3>
  Total : <span id="total">0</span>
  <canvas id="chart"></canvas>
</div>

<div class="box">
  <h3>📋 Liste des présences</h3>
  <ul id="liste"></ul>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsFxW7QON1JhWshuwz8EXE9NggQ0fCUMA",
  authDomain: "smartpresence-ff489.firebaseapp.com",
  databaseURL: "https://smartpresence-ff489-default-rtdb.firebaseio.com",
  projectId: "smartpresence-ff489",
  storageBucket: "smartpresence-ff489.firebasestorage.app",
  messagingSenderId: "676917669187",
  appId: "1:676917669187:web:d825c0b3ff3ee0944c13f6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let dataList = [];
let chart;

onValue(ref(db,"presences"), (snap)=>{

  let ul = document.getElementById("liste");
  ul.innerHTML="";
  dataList=[];

  let total = 0;
  let days = {};

  snap.forEach(c=>{
    let d = c.val();
    dataList.push(d);
    total++;

    let day = d.date.split(",")[0];
    days[day] = (days[day] || 0) + 1;

    let li = document.createElement("li");
    li.innerHTML = `
      <b>${d.nom}</b> - ${d.matricule}<br>
      <img src="${d.photo}" width="120">
    `;
    ul.appendChild(li);
  });

  document.getElementById("total").textContent = total;

  let labels = Object.keys(days);
  let values = Object.values(days);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: "Présences",
        data: values
      }]
    }
  });

});

window.exportExcel = function(){

  let ws = XLSX.utils.json_to_sheet(dataList);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Présences");

  XLSX.writeFile(wb, "presences.xlsx");
};

</script>

</body>
</html>
