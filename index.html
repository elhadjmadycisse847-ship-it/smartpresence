<!DOCTYPE html>
<html>
<head>
  <title>ISEP SmartPresence</title>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family:'Poppins';
      background:#0a0f1c;
      color:white;
    }

    header {
      padding:60px;
      text-align:center;
    }

    .btn {
      padding:15px;
      background:#00c6ff;
      margin:10px;
      display:inline-block;
      border-radius:10px;
      cursor:pointer;
    }

    .section {
      padding:40px;
      text-align:center;
    }

    #app, #admin, #loginBox {
      display:none;
      max-width:420px;
      margin:auto;
    }

    input, button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:10px;
      border:none;
    }

    video, img {
      width:100%;
      margin-top:10px;
    }
  </style>
</head>

<body>

<header>
  <h1>ISEP SmartPresence</h1>
  <p>Projet par <b>Elhadj Mady Cisse</b></p>

  <div class="btn" onclick="openApp()">🎓 Application</div>
  <div class="btn" onclick="openAdmin()">📊 Admin</div>
</header>

<!-- APP -->
<div id="app">

  <input id="nom" placeholder="Nom">
  <input id="matricule" placeholder="Matricule">

  <button onclick="startScanner()">Scanner QR</button>
  <div id="reader"></div>

  <video id="video" autoplay playsinline></video>
  <button onclick="takePhoto()">Valider présence</button>

  <canvas id="canvas" style="display:none;"></canvas>
  <img id="preview">

</div>

<!-- LOGIN -->
<div id="loginBox">
  <input id="user" placeholder="Email">
  <input id="pass" type="password" placeholder="Mot de passe">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="admin">

  <button onclick="exportExcel()">📥 Export Excel</button>

  <h3>Total : <span id="total">0</span></h3>
  <canvas id="chart"></canvas>

  <ul id="list"></ul>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsFxW7QON1JhWshuwz8EXE9NggQ0fCUMA",
  authDomain: "smartpresence-ff489.firebaseapp.com",
  databaseURL: "https://smartpresence-ff489-default-rtdb.firebaseio.com",
  projectId: "smartpresence-ff489",
  storageBucket: "smartpresence-ff489.appspot.com",
  messagingSenderId: "676917669187",
  appId: "1:676917669187:web:d825c0b3ff3ee0944c13f6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);


// NAV
window.openApp = () => document.getElementById("app").style.display="block";

window.openAdmin = ()=>{
  if(localStorage.getItem("admin") === "ok"){
    document.getElementById("admin").style.display="block";
  } else {
    document.getElementById("loginBox").style.display="block";
  }
};


// LOGIN
window.login = ()=>{
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u==="admin@isep.sn" && p==="1234"){
    localStorage.setItem("admin","ok");
    document.getElementById("loginBox").style.display="none";
    document.getElementById("admin").style.display="block";
  } else {
    alert("❌ accès refusé");
  }
};


// GPS
function checkGPS(cb){
  navigator.geolocation.getCurrentPosition(pos=>{
    let d = Math.sqrt(
      (pos.coords.latitude-14.742)**2 +
      (pos.coords.longitude+17.455)**2
    );
    cb(d<0.01);
  });
}


// CAMERA
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(s=>document.getElementById("video").srcObject=s);
}


// QR
window.startScanner = ()=>{
  let qr = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(dev=>{
    qr.start(dev[0].id,{fps:10,qrbox:250},()=>{
      qr.stop();
      startCamera();
    });
  });
};


// PHOTO
window.takePhoto = ()=>{
  checkGPS(async ok=>{

    if(!ok){ alert("⛔ hors zone"); return; }

    let v = document.getElementById("video");
    let c = document.getElementById("canvas");

    c.width = v.videoWidth;
    c.height = v.videoHeight;

    let ctx = c.getContext("2d");
    ctx.drawImage(v,0,0);

    let img = c.toDataURL("image/png");
    document.getElementById("preview").src = img;

    let file = sRef(storage,"photos/"+Date.now());
    await uploadString(file,img,"data_url");
    let url = await getDownloadURL(file);

    push(ref(db,"presences"),{
      nom: nom.value,
      matricule: matricule.value,
      photo:url,
      date:new Date().toLocaleString()
    });

    alert("✅ enregistré !");
  });
};


// ADMIN DATA
let dataList = [];
let chart;

onValue(ref(db,"presences"), snap=>{

  let ul = document.getElementById("list");
  ul.innerHTML="";
  dataList=[];

  let total=0;
  let days={};

  snap.forEach(c=>{
    let d=c.val();
    dataList.push(d);
    total++;

    let day=d.date.split(",")[0];
    days[day]=(days[day]||0)+1;

    let li=document.createElement("li");
    li.innerHTML=`${d.nom} (${d.matricule}) <img src="${d.photo}" width="80">`;
    ul.appendChild(li);
  });

  document.getElementById("total").textContent=total;

  let labels=Object.keys(days);
  let values=Object.values(days);

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{
    type:'bar',
    data:{labels:labels,datasets:[{data:values}]}
  });

});


// EXPORT
window.exportExcel = ()=>{
  let ws=XLSX.utils.json_to_sheet(dataList);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"data");
  XLSX.writeFile(wb,"presences.xlsx");
};

</script>

</body>
</html>
