<!DOCTYPE html>
<html>
<head>
  <title>SmartPresence ULTIME MAX</title>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    body { font-family: Arial; text-align: center; background:#f2f2f2; }

    button { padding:10px; margin:5px; border-radius:8px; background:blue; color:white; }

    #liste { background:white; padding:10px; margin-top:20px; border-radius:10px; }

    table { width:100%; margin-top:20px; border-collapse: collapse; }
    td, th { border:1px solid #ccc; padding:8px; }
  </style>
</head>

<body>

<h2>🚀 SmartPresence MAX</h2>

<input id="nom" placeholder="Nom"><br>
<input id="matricule" placeholder="Matricule"><br>

<button onclick="startScanner()">📸 Scanner</button>

<h3>🔁 QR Prof</h3>
<canvas id="qr"></canvas>

<h3>📊 Présences</h3>
<table id="table">
<tr><th>Nom</th><th>Matricule</th><th>Date</th></tr>
</table>

<button onclick="exportExcel()">📥 Export Excel</button>

<div id="reader"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "...",
  databaseURL: "...",
  projectId: "...",
  storageBucket: "...",
  messagingSenderId: "...",
  appId: "..."
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔁 QR DYNAMIQUE
let currentQR = "";

function generateQR() {
  currentQR = "PRESENCE-" + Date.now();

  QRCode.toCanvas(document.getElementById("qr"), currentQR);
}

setInterval(generateQR, 30000);
generateQR();

// 📸 SCAN
let html5QrCode;

window.startScanner = function() {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10 },
    (decodedText) => {

      if (decodedText !== currentQR) {
        alert("❌ QR invalide !");
        return;
      }

      let nom = document.getElementById("nom").value;
      let matricule = document.getElementById("matricule").value;

      push(ref(db, "presences"), {
        nom,
        matricule,
        date: new Date().toLocaleString()
      });

      alert("✅ Présence OK");
      html5QrCode.stop();
    }
  );
};

// 📊 TABLEAU
const table = document.getElementById("table");

onValue(ref(db, "presences"), snapshot => {
  table.innerHTML = "<tr><th>Nom</th><th>Matricule</th><th>Date</th></tr>";

  snapshot.forEach(child => {
    let data = child.val();

    let row = table.insertRow();
    row.insertCell(0).innerText = data.nom;
    row.insertCell(1).innerText = data.matricule;
    row.insertCell(2).innerText = data.date;
  });
});

// 📥 EXPORT EXCEL
window.exportExcel = function() {

  let csv = "Nom,Matricule,Date\n";

  const rows = table.querySelectorAll("tr");

  rows.forEach((row, i) => {
    if (i === 0) return;

    const cols = row.querySelectorAll("td");
    csv += `${cols[0].innerText},${cols[1].innerText},${cols[2].innerText}\n`;
  });

  let blob = new Blob([csv], { type: "text/csv" });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "presences.csv";
  a.click();
};

</script>

</body>
</html>
