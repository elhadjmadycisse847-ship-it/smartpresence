<!DOCTYPE html>
<html>
<head>
  <title>SmartPresence ULTRA PRO</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 80%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      background: blue;
      color: white;
    }

    #reader {
      margin: auto;
      margin-top: 20px;
    }

    #liste {
      background: white;
      padding: 10px;
      margin-top: 20px;
      border-radius: 10px;
      width: 90%;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }
  </style>
</head>

<body>

<h2>📌 SmartPresence ULTRA PRO</h2>

<input type="text" id="nom" placeholder="Nom"><br>
<input type="text" id="matricule" placeholder="Matricule"><br>

<button onclick="startScanner()">📸 Scanner QR</button>
<button onclick="switchCamera()">🔄 Changer caméra</button>

<div id="reader" style="width:300px;"></div>

<h3>📋 Liste des présences</h3>
<ul id="liste"></ul>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsFxW7QON1JhWshuwz8EXE9NggQ0fCUMA",
  authDomain: "smartpresence-ff489.firebaseapp.com",
  databaseURL: "https://smartpresence-ff489-default-rtdb.firebaseio.com",
  projectId: "smartpresence-ff489",
  storageBucket: "smartpresence-ff489.firebasestorage.app",
  messagingSenderId: "676917669187",
  appId: "1:676917669187:web:d825c0b3ff3ee0944c13f6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 📍 GPS
let userLatitude;
let userLongitude;

navigator.geolocation.getCurrentPosition((position) => {
  userLatitude = position.coords.latitude;
  userLongitude = position.coords.longitude;
});

// 📊 LISTE
const liste = document.getElementById("liste");

onValue(ref(db, "presences"), (snapshot) => {
  liste.innerHTML = "";

  snapshot.forEach((child) => {
    const data = child.val();

    let li = document.createElement("li");
    li.textContent = data.nom + " (" + data.matricule + ") - " + data.date;

    liste.appendChild(li);
  });
});

// 📸 CAMERA
let currentCamera = "environment";
let html5QrCode;

// ▶️ SCAN
window.startScanner = function () {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: currentCamera },
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      let nom = document.getElementById("nom").value;
      let matricule = document.getElementById("matricule").value;

      push(ref(db, "presences"), {
        nom,
        matricule,
        codeQR: decodedText,
        latitude: userLatitude,
        longitude: userLongitude,
        date: new Date().toLocaleString()
      });

      alert("✅ Présence validée !");
      html5QrCode.stop();
    }
  );
};

// 🔄 SWITCH CAM
window.switchCamera = function () {
  if (!html5QrCode) {
    alert("Clique d'abord sur Scanner QR");
    return;
  }

  html5QrCode.stop().then(() => {
    currentCamera = currentCamera === "environment" ? "user" : "environment";

    html5QrCode.start(
      { facingMode: currentCamera },
      { fps: 10, qrbox: 250 },
      (decodedText) => {

        let nom = document.getElementById("nom").value;
        let matricule = document.getElementById("matricule").value;

        push(ref(db, "presences"), {
          nom,
          matricule,
          codeQR: decodedText,
          latitude: userLatitude,
          longitude: userLongitude,
          date: new Date().toLocaleString()
        });

        alert("✅ Présence validée !");
        html5QrCode.stop();
      }
    );
  });
};

</script>

</body>
</html>
