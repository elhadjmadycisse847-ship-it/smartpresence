<!DOCTYPE html>
<html>
<head>
  <title>ISEP SmartPresence ULTRA FINAL</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      background:#0a0f1c;
      color:white;
      text-align:center;
    }

    .box {
      margin:20px;
      padding:15px;
      background:#1c1f2b;
      border-radius:15px;
    }

    input, button {
      width:90%;
      padding:10px;
      margin-top:10px;
      border-radius:10px;
      border:none;
    }

    button {
      background:#00c6ff;
      font-weight:bold;
    }

    video { width:90%; margin-top:10px; }
  </style>
</head>

<body>

<h2>ISEP SmartPresence ULTRA</h2>

<div class="box">
  <h3>QR ACTUEL</h3>
  <h1 id="qrCode"></h1>
</div>

<div class="box">
  <input id="nom" placeholder="Nom">
  <input id="matricule" placeholder="Matricule">

  <button onclick="startScanner()">Scanner QR</button>
  <div id="reader"></div>

  <video id="video" autoplay></video>
  <button onclick="takePhoto()">Valider présence</button>

  <canvas id="canvas" style="display:none;"></canvas>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsFxW7QON1JhWshuwz8EXE9NggQ0fCUMA",
  authDomain: "smartpresence-ff489.firebaseapp.com",
  databaseURL: "https://smartpresence-ff489-default-rtdb.firebaseio.com",
  projectId: "smartpresence-ff489",
  storageBucket: "smartpresence-ff489.firebasestorage.app",
  messagingSenderId: "676917669187",
  appId: "1:676917669187:web:d825c0b3ff3ee0944c13f6"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);


// 🔄 QR DYNAMIQUE (change toutes les 30 sec)
function generateQR(){
  let time = Math.floor(Date.now() / 30000);
  document.getElementById("qrCode").innerText = "ISEP-"+time;
}

setInterval(generateQR, 1000);
generateQR();


// 📍 GPS CHECK
function checkGPS(callback){

  navigator.geolocation.getCurrentPosition(pos=>{

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    let allowedLat = 14.742;
    let allowedLon = -17.455;

    let distance = Math.sqrt(
      (lat - allowedLat) ** 2 +
      (lon - allowedLon) ** 2
    );

    if(distance < 0.01){
      callback(true);
    } else {
      alert("⛔ Hors zone !");
      callback(false);
    }

  });
}


// 📸 CAMERA
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(s=>{
    document.getElementById("video").srcObject = s;
  });
}


// 📸 SCAN
let scannedCode = null;

window.startScanner = function(){

  let qr = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices=>{
    qr.start(devices[0].id,{fps:10,qrbox:250},(text)=>{
      scannedCode = text;
      qr.stop();
      startCamera();
    });
  });
};


// 📸 VALIDATION
window.takePhoto = async function(){

  checkGPS(async (ok)=>{

    if(!ok) return;

    let currentQR = "ISEP-"+Math.floor(Date.now()/30000);

    if(scannedCode !== currentQR){
      alert("⛔ QR expiré !");
      return;
    }

    let video = document.getElementById("video");
    let canvas = document.getElementById("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    let imageData = canvas.toDataURL("image/png");

    let fileRef = sRef(storage, "photos/" + Date.now());
    await uploadString(fileRef, imageData, "data_url");

    let url = await getDownloadURL(fileRef);

    push(ref(db,"presences"),{
      nom: document.getElementById("nom").value,
      matricule: document.getElementById("matricule").value,
      photo: url,
      qr: scannedCode,
      date: new Date().toLocaleString()
    });

    alert("✅ Présence VALIDÉE !");
  });

};

</script>

</body>
</html>
