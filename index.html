<!DOCTYPE html>
<html>
<head>
  <title>Test Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    button {
      padding: 15px;
      margin: 20px;
      font-size: 16px;
      background: green;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #reader {
      width: 300px;
      margin: auto;
    }
  </style>
</head>

<body>

<h2>📸 TEST SCANNER QR</h2>

<button onclick="startScanner()">Lancer Scanner</button>

<div id="reader"></div>

<script>

let html5QrCode;

function startScanner() {

  if (html5QrCode) {
    alert("Scanner déjà lancé");
    return;
  }

  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "user" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      alert("QR détecté: " + decodedText);
      html5QrCode.stop();
      html5QrCode = null;
    },
    (error) => {}
  );
}

</script>

</body>
</html>
