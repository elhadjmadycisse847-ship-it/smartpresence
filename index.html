<!DOCTYPE html>
<html>
<head>
  <title>SmartPresence ULTIME</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family: Arial; text-align: center; background: #f2f2f2; }

    input { padding: 10px; margin: 5px; width: 80%; border-radius: 8px; }

    button { padding: 10px; margin: 5px; border-radius: 8px; background: blue; color: white; }

    video, canvas { width: 300px; margin-top: 10px; }

    #liste {
      background: white;
      padding: 10px;
      margin-top: 20px;
      border-radius: 10px;
      width: 90%;
      margin: auto;
      text-align: left;
    }
  </style>
</head>

<body>

<h2>📌 SmartPresence ULTIME</h2>

<input type="text" id="nom" placeholder="Nom"><br>
<input type="text" id="matricule" placeholder="Matricule"><br>

<button onclick="startScanner()">📸 Scanner QR</button>
<button onclick="switchCamera()">🔄 Caméra</button>

<div id="reader"></div>

<h3>📸 Photo</h3>
<video id="video" autoplay></video><br>
<button onclick="prendrePhoto()">📸 Prendre photo</button>
<canvas id="canvas" style="display:none;"></canvas>

<h3>📋 Liste</h3>
<ul id="liste"></ul>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "...",
  databaseURL: "...",
  projectId: "...",
  storageBucket: "...",
  messagingSenderId: "...",
  appId: "..."
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// GPS
let lat, long;
navigator.geolocation.getCurrentPosition(pos => {
  lat = pos.coords.latitude;
  long = pos.coords.longitude;
});

// PHOTO
let photoData = "";

navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
  document.getElementById("video").srcObject = stream;
});

window.prendrePhoto = function() {
  const canvas = document.getElementById("canvas");
  const video = document.getElementById("video");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video, 0, 0);
  photoData = canvas.toDataURL("image/png");

  alert("📸 Photo capturée !");
};

// LISTE
const liste = document.getElementById("liste");

onValue(ref(db, "presences"), snapshot => {
  liste.innerHTML = "";
  snapshot.forEach(child => {
    const data = child.val();
    let li = document.createElement("li");
    li.textContent = data.nom + " - " + data.date;
    liste.appendChild(li);
  });
});

// QR
let html5QrCode;
let cam = "environment";

window.startScanner = function() {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: cam },
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      let nom = document.getElementById("nom").value;
      let matricule = document.getElementById("matricule").value;

      if (!photoData) {
        alert("Prends une photo !");
        return;
      }

      push(ref(db, "presences"), {
        nom,
        matricule,
        qr: decodedText,
        latitude: lat,
        longitude: long,
        photo: photoData,
        date: new Date().toLocaleString()
      });

      alert("✅ Présence validée !");
      html5QrCode.stop();
    }
  );
};

window.switchCamera = function() {
  html5QrCode.stop().then(() => {
    cam = cam === "environment" ? "user" : "environment";
    startScanner();
  });
};

</script>

</body>
</html>
