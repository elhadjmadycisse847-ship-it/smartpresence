<!DOCTYPE html>
<html>
<head>
  <title>ISEP SmartPresence PREMIUM</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    header {
      background: linear-gradient(135deg,#0a3d62,#1e90ff);
      padding:20px;
      text-align:center;
      border-bottom-left-radius:20px;
      border-bottom-right-radius:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
    }

    header img {
      width: 50px;
    }

    header h2 {
      margin: 5px 0;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .scanBtn {
      background: #00c6ff;
      color: black;
    }

    .photoBtn {
      background: #00ff94;
      color: black;
    }

    button:hover {
      transform: scale(1.05);
    }

    video, img {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: rgba(255,255,255,0.1);
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }

    .badge {
      background:#00ff94;
      color:black;
      padding:5px 10px;
      border-radius:20px;
      font-size:12px;
      display:inline-block;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<header>
  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
  <h2>ISEP SmartPresence</h2>
  <div style="font-size:13px;">Système intelligent de présence</div>
</header>

<div class="container">

<div class="card">
  <div class="badge">Étudiant</div>

  <input id="nom" placeholder="Nom complet">
  <input id="matricule" placeholder="Matricule">

  <button class="scanBtn" onclick="startScanner()">📸 Scanner QR</button>

  <div id="reader"></div>

  <video id="video" autoplay></video>

  <button class="photoBtn" onclick="takePhoto()">
    📷 Capturer la présence
  </button>

  <canvas id="canvas" style="display:none;"></canvas>

  <img id="preview" />
</div>

<div class="card">
  <div class="badge">Admin</div>
  <h3>📋 Présences</h3>
  <ul id="liste"></ul>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "TA_CLE",
  authDomain: "TON_PROJET.firebaseapp.com",
  databaseURL: "https://TON_PROJET-default-rtdb.firebaseio.com",
  projectId: "TON_PROJET",
  storageBucket: "TON_PROJET.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

// LISTE
const liste = document.getElementById("liste");

onValue(ref(db, "presences"), (snapshot) => {
  liste.innerHTML = "";

  snapshot.forEach((child) => {
    let d = child.val();

    let li = document.createElement("li");
    li.innerHTML = `
      <b>${d.nom}</b><br>
      ${d.matricule}<br>
      <img src="${d.photo}" />
    `;

    liste.appendChild(li);
  });
});

// SCANNER
let html5QrCode;

window.startScanner = function() {

  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    let cameraId = devices[0].id;

    html5QrCode.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      () => {
        html5QrCode.stop();
        startCamera();
      }
    );

  });
};

// CAMERA
function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      document.getElementById("video").srcObject = stream;
    });
}

// PHOTO
window.takePhoto = async function() {

  let video = document.getElementById("video");
  let canvas = document.getElementById("canvas");
  let preview = document.getElementById("preview");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  let imageData = canvas.toDataURL("image/png");
  preview.src = imageData;

  let fileRef = sRef(storage, "photos/" + Date.now());

  await uploadString(fileRef, imageData, "data_url");

  let url = await getDownloadURL(fileRef);

  let nom = document.getElementById("nom").value;
  let matricule = document.getElementById("matricule").value;

  push(ref(db, "presences"), {
    nom,
    matricule,
    photo: url,
    date: new Date().toLocaleString()
  });

  alert("✅ Présence enregistrée !");
};

</script>

</body>
</html>
