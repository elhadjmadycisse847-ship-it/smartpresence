<!DOCTYPE html>
<html>
<head>
  <title>SmartPresence SIMPLE</title>

  <style>
    body {
      background: black;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 200px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px;
      margin: 10px;
      background: green;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🎓 ISEP Diamniadio</h1>

<h2>📋 Marquer présence</h2>

<input type="text" id="nom" placeholder="Nom"><br>
<input type="text" id="matricule" placeholder="Matricule"><br>
<input type="text" id="code" placeholder="Code du cours"><br>

<button onclick="valider()">✅ Valider</button>

<script>
function valider() {

  let nom = document.getElementById("nom").value;
  let matricule = document.getElementById("matricule").value;
  let code = document.getElementById("code").value;

  if (!nom || !matricule || !code) {
    alert("Remplis tout !");
    return;
  }

  alert("Présence enregistrée pour " + nom);
}
</script>

</body>
</html>
